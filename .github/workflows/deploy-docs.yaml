name: Deploy VitePress & Build LLM JSON

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build LLM JSON (dist/llm)
        run: |
          pip install python-frontmatter
          python scripts/parse_to_json.py

      # src配下のMarkdownをVitePressドキュメントルートに同期
      - name: Sync source for Human (dist/human)
        run: |
          mkdir -p src  # srcが存在しなければ作成、あれば何もしない
          rsync -av --exclude='.vitepress' src/ dist/human/

      # 生成された dist/llm を main ブランチに自動コミット＆プッシュ
      - name: Commit and Push dist/llm
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dist/llm/
          # 差分がある場合のみコミットしてプッシュ
          if ! git diff --cached --quiet; then
            git commit -m "chore(artifacts): dist/llm の自動更新 [skip ci]"
            git push origin main
          else
            echo "No changes in dist/llm"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress
        run: npm run docs:build # package.json に "docs:build": "vitepress build dist/human" を設定

      # LLM用のJSONを、Pagesで公開するフォルダにコピー
      - name: Expose JSON to GitHub Pages
        run: cp -r dist/llm dist/human/.vitepress/dist/llm

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist/human/.vitepress/dist'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4